name: Glider Plugin Tests

on:
  pull_request:
  push:

# Deny all permissions by default
permissions: {}

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: "3.x"

    - name: Install netcdf-c
      run: >
        sudo apt-get update
        && sudo apt-get install netcdf-bin

    - name: Install compliance-checker
      shell: bash -l {0}
      run: |
        python -m pip install -v -e .[test]

    - name: cc-plugin-glider tests
      shell: bash -l {0}
      run: >
        git clone https://github.com/ioos/cc-plugin-glider.git
        && cd cc-plugin-glider
        && python -m pip install --requirement requirements-dev.txt
        && python -m pip install -e .
        && python -m pytest -s -rxs -v cc_plugin_glider
