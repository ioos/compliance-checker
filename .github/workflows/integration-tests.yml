name: Integration Tests

on:
  pull_request:
  push:

# Deny all permissions by default
permissions: {}

jobs:
  run:
    name: cf-units ${{ matrix.cf_units }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cf_units: [ false ]
        include:
          - cf_units: true
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.x"

    - name: Install netcdf-c
      run: >
        sudo apt-get update
        && sudo apt-get install netcdf-bin libnetcdf-dev

    - name: Test with cf-units (optional)
      if: matrix.cf_units == true
      run: >-
        python -m pip install cf-units

    - name: Install compliance-checker
      run: |
        python -m pip install -e .[test]

    - name: Integration Tests
      run: python -m pytest -m "integration" -s -rxs -v --vcr-record=none compliance_checker
