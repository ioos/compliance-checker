name: Integration Tests

on:
  pull_request:
  push:

# Deny all permissions by default
permissions: {}

jobs:
  run:
    name: cf-units ${{ matrix.cf_units }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cf_units: [ false ]
        include:
          - cf_units: true
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: "3.x"

    - name: Install netcdf-c
      run: >
        sudo apt-get update
        && sudo apt-get install netcdf-bin libnetcdf-dev

    - name: Test with cf-units (optional)
      if: matrix.cf_units == true
      run: >-
        python -m pip install cf-units

    - name: Install compliance-checker
      run: |
        python -m pip install -e .[test]

    - name: Integration Tests
      run: python -m pytest -m "integration" -s -rxs -v --vcr-record=none compliance_checker
